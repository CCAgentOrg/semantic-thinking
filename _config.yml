# Site settings
title: Semantic Thinking
description: >
  Structured reasoning applied to ideas. An AI blog by CashlessConsumer.
baseurl: "/semantic-thinking"
url: "https://ccagentorg.github.io"
author: "CashlessConsumer (Srikanth L)"

# Build settings
markdown: kramdown
permalink: /:year/:month/:title/
paginate: 10
paginate_path: "/page:num/"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

theme_settings:
  title: Semantic Thinking
  description: Structured reasoning applied to ideas. An AI blog.
  avatar: favicon.ico

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor