<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --image-border: rgba(0,0,0,0.08);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
        --image-border: rgba(255,255,255,0.12);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--fg);
      font-size: 22px;
      padding: 4px 0;
      cursor: pointer;
      line-height: 1;
    }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    @media (max-width: 540px) {
      .container { padding: 32px 16px 60px; }
      nav { flex-wrap: wrap; gap: 0; margin-bottom: 32px; }
      .nav-toggle { display: block; margin-left: auto; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 0;
        padding: 12px 0 8px;
        border-top: 1px solid var(--border);
        margin-top: 10px;
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        display: block;
        padding: 10px 0;
        font-size: 15px;
        border-bottom: 1px solid var(--border);
      }
      .nav-links a:last-child { border-bottom: none; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; margin-top: 28px; }
      h3 { font-size: 1rem; }
      body { font-size: 15px; }
      .home-intro h1 { font-size: 1.6rem; }
      .home-intro p { font-size: 14px; }
      .post-title { font-size: 1.1rem; }
      .post-content { font-size: 15px; }
      .pagination { flex-direction: column; gap: 8px; text-align: center; }
    }
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }
    .post-content { max-width: 680px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre {
      overflow-x: auto;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      font-size: 13px;
      line-height: 1.5;
      background: none;
      border: none;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 20px 0;
      border: 1px solid var(--image-border);
      cursor: zoom-in;
      transition: box-shadow 0.2s;
    }
    .post-content img:hover { box-shadow: 0 2px 16px rgba(0,0,0,0.12); }
    /* Lightbox overlay for clicked images */
    .image-lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      cursor: zoom-out;
      padding: 24px;
      align-items: center;
      justify-content: center;
    }
    .image-lightbox.open { display: flex; }
    .image-lightbox img {
      max-width: min(95vw, 1400px);
      max-height: 90vh;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      border: none;
      cursor: zoom-out;
    }
    /* Table scroll wrapper */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .table-wrapper table {
      margin: 0;
      border: none;
      min-width: 520px;
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .post-content th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }
    .about-content { margin-top: 32px; }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }
    @media (max-width: 540px) {
      footer { margin-top: 48px; padding-top: 20px; font-size: 12px; }
      .post-content pre { font-size: 12px; }
      .post-content pre code { padding: 12px; font-size: 12px; }
      .post-content th, .post-content td { padding: 6px 8px; font-size: 12px; }
      .post-meta { font-size: 12px; }
      .tag { font-size: 10px; }
      .home-intro { margin-bottom: 32px; }
      .home-intro p { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">&#9776;</button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>
  <!-- Lightbox overlay -->
  <div class="image-lightbox" id="imageLightbox">
    <img id="lightboxImage" src="" alt="">
  </div>
  <script>
    (function() {
      // --- Responsive nav toggle ---
      var toggle = document.getElementById('navToggle');
      var links = document.getElementById('navLinks');
      if (toggle && links) {
        toggle.addEventListener('click', function(e) {
          links.classList.toggle('open');
          e.stopPropagation();
        });
      }

      // --- Image lightbox (click-to-zoom) ---
      var lightbox = document.getElementById('imageLightbox');
      var lightboxImg = document.getElementById('lightboxImage');
      if (lightbox && lightboxImg) {
        lightbox.addEventListener('click', function() {
          lightbox.classList.remove('open');
        });

        var images = document.querySelectorAll('.post-content img');
        for (var i = 0; i < images.length; i++) {
          (function(img) {
            img.addEventListener('click', function(e) {
              lightboxImg.src = img.src;
              lightboxImg.alt = img.alt;
              lightbox.classList.add('open');
              e.preventDefault();
            });
          })(images[i]);
        }

        // Close lightbox on Escape
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && lightbox.classList.contains('open')) {
            lightbox.classList.remove('open');
          }
        });
      }

      // --- Lazy load images ---
      if ('IntersectionObserver' in window) {
        var lazyImages = document.querySelectorAll('.post-content img[loading="lazy"]');
        for (var i = 0; i < lazyImages.length; i++) {
          (function(img) {
            new IntersectionObserver(function(entries) {
              if (entries[0].isIntersecting) {
                // If data-src is set (native pattern), use it
                if (img.getAttribute('data-src')) {
                  img.src = img.getAttribute('data-src');
                }
                // Remove observer once loaded
                var obs = entries[0].target._lazyObserver;
                if (obs) obs.disconnect();
              }
            }).observe(img);
          })(lazyImages[i]);
        }
      }

      // --- Table scroll wrappers ---
      var tables = document.querySelectorAll('.post-content > table');
      for (var i = 0; i < tables.length; i++) {
        var wrapper = document.createElement('div');
        wrapper.className = 'table-wrapper';
        tables[i].parentNode.insertBefore(wrapper, tables[i]);
        wrapper.appendChild(tables[i]);
      }
    })();
  </script>
</body>
</html>
