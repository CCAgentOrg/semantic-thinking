<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
      flex-wrap: wrap;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--fg); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    /* Mobile nav toggle */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--fg);
    }
    .nav-toggle svg { display: block; }
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }
    .post-content { max-width: 680px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 13px;
      line-height: 1.5;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }
    /* Image container with zoom capability */
    .post-content .img-wrap {
      margin: 16px 0;
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .post-content .img-wrap:hover {
      border-color: var(--accent);
    }
    .post-content .img-wrap img {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
      cursor: zoom-in;
      margin: 0;
      border-radius: 0;
    }
    .post-content img:not(.img-wrap img) {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 16px 0;
    }
    /* Lightbox overlay */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.88);
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }
    /* Table scroll wrapper */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 480px;
    }
    .table-wrap table {
      margin: 0;
      border: none;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .post-content th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }
    .about-content { margin-top: 32px; }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }
    /* Responsive breakpoints */
    @media (max-width: 640px) {
      .container {
        padding: 32px 16px 64px;
      }
      nav {
        gap: 0;
        margin-bottom: 32px;
      }
      .nav-toggle { display: flex; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 12px;
        padding: 16px 0 8px;
        border-top: 1px solid var(--border);
        margin-top: 8px;
      }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 15px; padding: 4px 0; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; }
      .home-intro h1 { font-size: 1.6rem; }
      .home-intro p { font-size: 14px; }
      .post-title { font-size: 1.1rem; }
      .post-content { font-size: 15px; }
      .post-content blockquote {
        padding-left: 12px;
        margin-left: 0;
      }
      .post-content pre code {
        font-size: 12px;
        padding: 12px;
      }
      .pagination {
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
    }
    @media (max-width: 400px) {
      .container { padding: 24px 12px 48px; }
      h1 { font-size: 1.3rem; }
      .post-content { font-size: 14px; }
      .post-content code { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle navigation">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="5" x2="17" y2="5"/>
          <line x1="3" y1="10" x2="17" y2="10"/>
          <line x1="3" y1="15" x2="17" y2="15"/>
        </svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    // Mobile nav toggle
    function toggleNav() {
      document.getElementById('navLinks').classList.toggle('open');
    }

    // Image lightbox: click any post image to zoom
    (function() {
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightboxImg');
      var images = document.querySelectorAll('.post-content img');
      for (var i = 0; i < images.length; i++) {
        (function(img) {
          // Skip already-wrapped images or ones in tables
          if (img.closest('.img-wrap') || img.closest('.table-wrap')) return;
          img.addEventListener('click', function(e) {
            if (lightbox) {
              lightboxImg.src = img.src;
              lightboxImg.alt = img.alt;
              lightbox.classList.add('active');
            }
          });
        })(images[i]);
      }

      function closeLightbox() {
        lightbox.classList.remove('active');
      }

      // Close lightbox on Escape
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
          closeLightbox();
        }
      });
    })();

    // Responsive table wraps
    (function() {
      var tables = document.querySelectorAll('.post-content table');
      for (var i = 0; i < tables.length; i++) {
        var wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        tables[i].parentNode.insertBefore(wrap, tables[i]);
        wrap.appendChild(tables[i]);
      }
    })();

    // Lazy-load images that are below the fold
    (function() {
      if ('IntersectionObserver' in window) {
        var lazyImgs = document.querySelectorAll('.post-content img[loading]');
        // Also wrap large image containers for responsive behavior
        var allImgs = document.querySelectorAll('.post-content img:not(.img-wrap img):not(a img)');
        for (var i = 0; i < allImgs.length; i++) {
          allImgs[i].setAttribute('loading', 'lazy');
        }
      }
    })();

    // Close mobile nav when clicking outside
    document.addEventListener('click', function(e) {
      var nav = document.querySelector('nav');
      var links = document.getElementById('navLinks');
      if (nav && !nav.contains(e.target) && links.classList.contains('open')) {
        links.classList.remove('open');
      }
    });
  </script>
</body>
</html>
