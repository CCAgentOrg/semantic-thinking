<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
      --container-pad: 24px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px var(--container-pad) 80px;
    }
    /* ===== Navigation ===== */
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
      position: relative;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    nav .site-title a { color: var(--fg); }
    .nav-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      color: var(--fg);
      font-size: 18px;
      line-height: 1;
    }
    .nav-toggle:hover { background: var(--border); }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    /* ===== Typography ===== */
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    /* ===== Post list (home) ===== */
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    /* ===== Home intro ===== */
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }
    /* ===== Post content ===== */
    .post-content { max-width: 100%; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      font-size: 13px;
      line-height: 1.5;
      border: none;
      background: none;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }
    /* ===== Images ===== */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 16px 0;
      display: block;
      border: 1px solid var(--border);
      transition: opacity 0.3s, transform 0.2s;
      cursor: zoom-in;
    }
    .post-content img:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .post-content img[loading="lazy"] {
      opacity: 0;
    }
    .post-content img.loaded {
      opacity: 1;
    }
    .post-content figure {
      margin: 24px 0;
      text-align: center;
    }
    .post-content figure img {
      margin: 0 auto 8px;
    }
    .post-content figure figcaption {
      font-size: 13px;
      color: var(--fg-muted);
      font-style: italic;
    }
    /* Image lightbox overlay */
    .lightbox-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      padding: 32px;
    }
    .lightbox-overlay.active {
      display: flex;
    }
    .lightbox-overlay img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    /* ===== Tables ===== */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 480px;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    .post-content th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .post-content ul, .post-content ol { padding-left: 24px; margin-bottom: 16px; }
    .post-content li { margin-bottom: 6px; }
    /* ===== Pagination ===== */
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a { font-size: 14px; font-weight: 500; }
    .about-content { margin-top: 32px; }
    /* ===== Footer ===== */
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }
    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      :root { --container-pad: 16px; }
      .container { padding-top: 24px; }
      nav { flex-wrap: wrap; margin-bottom: 32px; }
      .nav-toggle { display: block; }
      .nav-links {
        display: none;
        flex-direction: column;
        width: 100%;
        gap: 0;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        padding: 12px 16px;
        font-size: 15px;
        border-bottom: 1px solid var(--border);
      }
      .nav-links a:last-child { border-bottom: none; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; }
      .home-intro h1 { font-size: 1.6rem; }
      .post-title { font-size: 1.1rem; }
      .post-content pre code { font-size: 12px; padding: 12px; }
      .post-content figure { margin: 16px 0; }
      .post-content table { font-size: 13px; }
      .post-content img { margin: 12px 0; }
      .lightbox-overlay { padding: 16px; }
    }
    @media (max-width: 480px) {
      .post-meta { font-size: 12px; }
      .post-excerpt { font-size: 13px; }
      .home-intro p { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></span>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>

  <!-- Lightbox container -->
  <div class="lightbox-overlay" id="lightboxOverlay">
    <img id="lightboxImage" src="" alt="" />
  </div>

  <script>
    // === Mobile hamburger nav ===
    document.getElementById('navToggle')?.addEventListener('click', function() {
      document.getElementById('navLinks')?.classList.toggle('open');
    });
    document.addEventListener('click', function(e) {
      const nav = document.querySelector('nav');
      if (nav && !nav.contains(e.target)) {
        document.getElementById('navLinks')?.classList.remove('open');
      }
    });

    // === Image lazy loading ===
    document.querySelectorAll('.post-content img').forEach(function(img) {
      // Skip images already in viewport or small icons
      if (img.closest('.home-intro') || img.width < 100) return;
      
      // Enable click-to-zoom
      img.addEventListener('click', function() {
        const overlay = document.getElementById('lightboxOverlay');
        const lightImg = document.getElementById('lightboxImage');
        if (overlay && lightImg) {
          lightImg.src = this.src;
          lightImg.alt = this.alt || '';
          overlay.classList.add('active');
        }
      });

      // Lazy load with IntersectionObserver
      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              var dataSrc = img.getAttribute('data-src');
              if (dataSrc) img.src = dataSrc;
              img.removeAttribute('data-src');
              img.classList.add('loaded');
              observer.unobserve(img);
            }
          });
        }, { rootMargin: '200px' });
        observer.observe(img);
      } else {
        img.classList.add('loaded');
      }
    });

    // === Close lightbox on click ===
    document.getElementById('lightboxOverlay')?.addEventListener('click', function() {
      this.classList.remove('active');
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('lightboxOverlay')?.classList.remove('active');
      }
    });

    // === Responsive: wrap tables in scroll container ===
    document.querySelectorAll('.post-content table').forEach(function(table) {
      var wrapper = document.createElement('div');
      wrapper.className = 'table-wrapper';
      table.parentNode.insertBefore(wrapper, table);
      wrapper.appendChild(table);
    });

    // === Responsive: wrap image+h1 combos in figures if followed by caption ===
    // (no-op: Jekyll markdown handles p/em nesting)
  </script>
</body>
</html>
