<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    /* Responsive nav */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 48px;
    }
    .nav-bar a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .nav-bar a:hover { color: var(--accent); }
    .nav-bar .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 4px; color: var(--fg); }
    .nav-toggle svg { display: block; }
    @media (max-width: 640px) {
      .container { padding: 28px 16px 64px; }
      .nav-bar { margin-bottom: 32px; position: relative; flex-wrap: wrap; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 4px;
        padding: 8px 0 4px;
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        display: block;
        padding: 8px 0;
        font-size: 15px;
        border-bottom: 1px solid var(--border);
      }
      .nav-toggle { display: block; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; }
      .home-intro h1 { font-size: 1.6rem; }
      .home-intro p { font-size: 14px; }
      .post-title { font-size: 1.1rem; }
      .post-content { font-size: 15px; }
      .post-content code { font-size: 13px; word-break: break-word; }
    }
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }
    .post-content { max-width: 680px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 6px;
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 13px;
      line-height: 1.5;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }
    /* Responsive images */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 16px 0;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.2s, filter 0.2s;
    }
    @media (prefers-color-scheme: dark) {
      .post-content img {
        border: 1px solid var(--border);
      }
    }
    .post-content img.loading {
      opacity: 0;
      filter: blur(8px);
    }
    .post-content img.loaded {
      opacity: 1;
      filter: blur(0);
    }
    /* Image lightbox overlay */
    .img-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      padding: 20px;
    }
    .img-lightbox.open { display: flex; }
    .img-lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }
    /* Table scroll wrapper */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .table-wrapper table {
      width: 100%;
      border-collapse: collapse;
      border: none;
      font-size: 14px;
      min-width: 480px;
    }
    .table-wrapper th, .table-wrapper td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .table-wrapper th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }
    .about-content { margin-top: 32px; }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }
    @media (max-width: 640px) {
      footer { margin-top: 40px; padding-top: 16px; font-size: 12px; }
      .pagination { flex-direction: column; gap: 8px; }
      .post-list li { padding: 16px 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav-bar">
      <span class="site-title"><a href="{{ '/' | relative_url }}" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle navigation menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>
  <div class="img-lightbox" id="imgLightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="">
  </div>
  <script>
    /* Mobile nav toggle */
    function toggleNav() {
      document.getElementById('navLinks').classList.toggle('open');
    }
    /* Close mobile nav on link click */
    document.getElementById('navLinks').addEventListener('click', function() {
      if (window.innerWidth <= 640) this.classList.remove('open');
    });
    /* Lazy load images + click-to-zoom lightbox */
    (function() {
      var lb = document.getElementById('imgLightbox');
      var lbImg = document.getElementById('lightboxImg');
      var imgs = document.querySelectorAll('.post-content img');
      for (var i = 0; i < imgs.length; i++) {
        var img = imgs[i];
        img.classList.add('loading');
        /* Lazy load via IntersectionObserver if available */
        if ('IntersectionObserver' in window) {
          var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
              if (e.isIntersecting) {
                var t = e.target;
                if (t.dataset.src) t.src = t.dataset.src;
                t.classList.remove('loading');
                t.classList.add('loaded');
                obs.unobserve(t);
              }
            });
          }, { rootMargin: '200px' });
          obs.observe(img);
        } else {
          img.classList.remove('loading');
          img.classList.add('loaded');
        }
        /* Click to open lightbox */
        img.addEventListener('click', function(e) {
          e.stopPropagation();
          lbImg.src = this.src;
          lbImg.alt = this.alt || '';
          lb.classList.add('open');
          document.body.style.overflow = 'hidden';
        });
      }
      window.closeLightbox = function() {
        lb.classList.remove('open');
        document.body.style.overflow = '';
      };
      /* Close lightbox on Escape */
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lb.classList.contains('open')) {
          closeLightbox();
        }
      });
    })();

    /* Table wrapper: wrap bare tables with scroll container */
    (function() {
      var tables = document.querySelectorAll('.post-content > table');
      for (var i = 0; i < tables.length; i++) {
        var wrapper = document.createElement('div');
        wrapper.className = 'table-wrapper';
        tables[i].parentNode.insertBefore(wrapper, tables[i]);
        wrapper.appendChild(tables[i]);
      }
    })();
  </script>
</body>
</html>
