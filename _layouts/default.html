<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="theme-color" content="#2563eb">
  <meta name="color-scheme" content="light dark">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    /* Navigation */
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
      flex-wrap: wrap;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
      padding: 4px 0;
    }
    nav a:hover { color: var(--accent); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    .nav-toggle { display: none; }
    .nav-links { display: flex; gap: 24px; align-items: center; }

    /* Typography */
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; letter-spacing: -0.01em; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; letter-spacing: -0.01em; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; word-break: break-word; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }
    .post-content { max-width: 680px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
      word-break: break-word;
    }
    .post-content pre {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      margin: 16px 0;
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      font-size: 13px;
      line-height: 1.5;
      border: none;
      background: none;
      word-break: normal;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }
    /* Images */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 16px 0;
      cursor: zoom-in;
      transition: opacity 0.2s, box-shadow 0.2s;
      display: block;
    }
    .post-content img:hover {
      opacity: 0.95;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    @media (prefers-color-scheme: dark) {
      .post-content img {
        background: var(--bg-card);
        border: 1px solid var(--border);
        padding: 4px;
      }
    }
    .img-wrapper {
      position: relative;
      margin: 16px 0;
    }
    .img-wrapper img { margin: 0; }
    .img-caption {
      font-size: 13px;
      color: var(--fg-muted);
      text-align: center;
      margin-top: 6px;
      font-style: italic;
    }
    /* Image lightbox */
    .lightbox-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      cursor: zoom-out;
      padding: 24px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .lightbox-overlay.active { display: flex; align-items: center; justify-content: center; }
    .lightbox-overlay img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }
    /* Tables */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 480px;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .post-content th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }
    .about-content { margin-top: 32px; }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }
    /* Focus styles for accessibility */
    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }
    /* Mobile breakpoint */
    @media (max-width: 640px) {
      .container { padding: 32px 16px 60px; }
      nav { margin-bottom: 32px; }
      .nav-toggle {
        display: block;
        background: none;
        border: none;
        color: var(--fg-muted);
        font-size: 24px;
        cursor: pointer;
        padding: 4px;
        line-height: 1;
        margin-left: auto;
      }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 8px;
        padding: 12px 0 4px;
        border-top: 1px solid var(--border);
        margin-top: 8px;
      }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 15px; padding: 6px 0; display: block; }
      h1 { font-size: 1.4rem; }
      h2 { font-size: 1.15rem; margin-top: 24px; }
      h3 { font-size: 1rem; }
      .home-intro h1 { font-size: 1.6rem; }
      .post-title { font-size: 1.05rem; }
      .post-content { font-size: 15px; line-height: 1.65; }
      .post-content code { font-size: 13px; }
      .post-content pre code { font-size: 12px; padding: 12px; }
      .post-content img { border-radius: 4px; }
      .lightbox-overlay { padding: 12px; }
      .lightbox-overlay img { max-width: 100vw; max-height: 90vh; border-radius: 2px; }
      footer { margin-top: 40px; padding-top: 16px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>
  <!-- Lightbox overlay -->
  <div class="lightbox-overlay" id="lightboxOverlay" onclick="this.classList.remove('active')">
    <img id="lightboxImg" src="" alt="Zoomed diagram">
  </div>
  <script>
    // Mobile nav toggle
    document.getElementById('navToggle').addEventListener('click', function() {
      const links = document.getElementById('navLinks');
      const expanded = this.getAttribute('aria-expanded') === 'true' ? false : true;
      links.classList.toggle('open');
      this.setAttribute('aria-expanded', expanded);
    });

    // Image lightbox — click any post image to view full size
    document.querySelectorAll('.post-content img').forEach(function(img) {
      img.addEventListener('click', function(e) {
        e.stopPropagation();
        document.getElementById('lightboxImg').src = this.src;
        document.getElementById('lightboxImg').alt = this.alt || 'Enlarged diagram';
        document.getElementById('lightboxOverlay').classList.add('active');
      });
    });

    // Close lightbox on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('lightboxOverlay').classList.remove('active');
      }
    });

    // Lazy load images with IntersectionObserver
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              img.removeAttribute('data-src');
            }
            observer.unobserve(img);
          }
        });
      }, { rootMargin: '200px' });

      document.querySelectorAll('.post-content img[data-src]').forEach(function(img) {
        observer.observe(img);
      });
    }
  </script>
</body>
</html>
