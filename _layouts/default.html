<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
      .post-content img {
        background: #1a1a18;
        border: 1px solid #2a2a28;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }

    /* ---- Mobile nav ---- */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--fg);
    }
    .nav-toggle svg { display: block; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    @media (max-width: 640px) {
      .container { padding: 32px 16px 60px; }
      nav { flex-wrap: wrap; margin-bottom: 32px; }
      .nav-toggle { display: block; margin-left: auto; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 0;
        padding: 12px 0 4px;
        border-top: 1px solid var(--border);
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        display: block;
        padding: 10px 0;
        width: 100%;
        font-size: 15px;
        border-bottom: 1px solid var(--border);
      }
      .nav-links a:last-child { border-bottom: none; }
    }

    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }
    .post-content { max-width: 680px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      overflow-x: auto;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 13px;
      line-height: 1.5;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }

    /* ---- Images: responsive + click-to-zoom ---- */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 20px 0;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.2s;
    }
    .post-content img[loading="lazy"] { opacity: 0; }
    .post-content img[loading="lazy"].loaded,
    .post-content img[loading="lazy"][complete] { opacity: 1; }

    /* Image zoom overlay */
    .img-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      padding: 20px;
      cursor: zoom-out;
    }
    .img-overlay.active { display: flex; }
    .img-overlay img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }

    /* ---- Image caption ---- */
    .post-content img + em {
      display: block;
      text-align: center;
      font-size: 13px;
      color: var(--fg-muted);
      margin-top: -12px;
      margin-bottom: 20px;
    }

    /* ---- Tables: horizontal scroll ---- */
    .post-content .table-wrap {
      overflow-x: auto;
      margin: 16px 0;
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 480px;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    .post-content th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }
    .about-content { margin-top: 32px; }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }

    /* ---- Mobile typography ---- */
    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; }
      .home-intro h1 { font-size: 1.6rem; }
      .post-title { font-size: 1.05rem; }
      body { font-size: 15px; }
      .post-content pre code { font-size: 12px; padding: 12px; }
      .post-content img { border-radius: 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="5" x2="17" y2="5"/>
          <line x1="3" y1="10" x2="17" y2="10"/>
          <line x1="3" y1="15" x2="17" y2="15"/>
        </svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>

  <!-- Image zoom overlay -->
  <div class="img-overlay" id="imgOverlay">
    <img id="imgOverlayImg" src="" alt="" />
  </div>

  <script>
    (function() {
      // ---- Image lazy loading ----
      const images = document.querySelectorAll('.post-content img');
      if ('loading' in HTMLImageElement.prototype) {
        images.forEach(img => {
          img.loading = 'lazy';
          if (img.complete) img.classList.add('loaded');
          else img.addEventListener('load', function() { this.classList.add('loaded'); });
        });
      }

      // ---- Image click-to-zoom ----
      const overlay = document.getElementById('imgOverlay');
      const overlayImg = document.getElementById('imgOverlayImg');

      images.forEach(img => {
        img.addEventListener('click', function(e) {
          e.stopPropagation();
          overlayImg.src = this.src;
          overlayImg.alt = this.alt || '';
          overlay.classList.add('active');
          document.body.style.overflow = 'hidden';
        });
      });

      overlay.addEventListener('click', function() {
        this.classList.remove('active');
        document.body.style.overflow = '';
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          overlay.classList.remove('active');
          document.body.style.overflow = '';
        }
      });

      // ---- Mobile nav toggle ----
      const toggle = document.getElementById('navToggle');
      const links = document.getElementById('navLinks');
      if (toggle && links) {
        toggle.addEventListener('click', function() {
          links.classList.toggle('open');
        });
        // Close nav on link click (mobile)
        links.querySelectorAll('a').forEach(function(a) {
          a.addEventListener('click', function() {
            links.classList.remove('open');
          });
        });
      }
    })();
  </script>
</body>
</html>
