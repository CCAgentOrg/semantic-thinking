<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
      flex-wrap: wrap;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--fg-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .nav-toggle:hover { background: var(--border); }
    .nav-links { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }
    .post-content { max-width: 680px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 13px;
      line-height: 1.5;
      border: none;
      background: none;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }
    /* Image container for large diagrams */
    .post-content .img-container {
      margin: 16px 0;
      border-radius: 8px;
      overflow: hidden;
      cursor: zoom-in;
      position: relative;
      border: 1px solid var(--border);
      background: var(--bg-card);
      transition: border-color 0.2s;
    }
    .post-content .img-container:hover {
      border-color: var(--accent);
    }
    .post-content .img-container img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 480px;
      object-fit: contain;
      border-radius: 0;
      margin: 0;
      transition: opacity 0.3s;
    }
    .post-content .img-container img.loading { opacity: 0; }
    .post-content .img-container img.loaded { opacity: 1; }
    .post-content .img-container::after {
      content: "↗";
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 13px;
      color: var(--fg-muted);
      opacity: 0.6;
      pointer-events: none;
    }
    /* Lightbox overlay for zoomed images */
    .img-lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .img-lightbox.active { display: flex; }
    .img-lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    /* Inline images (non-container) */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 16px 0;
    }
    @media (prefers-color-scheme: dark) {
      .post-content img, .post-content .img-container { border-color: var(--border); }
    }
    /* Table horizontal scroll */
    .post-content .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 500px;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    .post-content th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }
    .about-content { margin-top: 32px; }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }
    /* ===== Responsive Breakpoints ===== */
    @media (max-width: 640px) {
      .container { padding: 32px 16px 60px; }
      body { font-size: 15px; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; margin-top: 24px; }
      .home-intro h1 { font-size: 1.6rem; }
      .home-intro p { font-size: 14px; }
      .post-title { font-size: 1.1rem; }
      .post-content { font-size: 15px; }
      .post-content h1 { font-size: 1.5rem; margin-top: 28px; }
      .post-content h2 { font-size: 1.2rem; }
      .post-content code { font-size: 13px; }
      .post-content pre code { font-size: 12px; padding: 12px; }
      /* Stack nav on mobile */
      nav { gap: 0; }
      .nav-toggle { display: block; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 8px;
        padding: 12px 0 4px;
      }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 15px; padding: 6px 0; }
      .pagination { flex-direction: column; gap: 12px; }
      .post-content img { border-radius: 4px; margin: 12px 0; }
      .post-content .img-container img { max-height: 320px; }
    }
    @media (max-width: 480px) {
      .container { padding: 24px 12px 48px; }
      body { font-size: 14px; line-height: 1.65; }
      h1 { font-size: 1.35rem; }
      h2 { font-size: 1.1rem; }
      .home-intro h1 { font-size: 1.4rem; }
      .post-meta { font-size: 12px; flex-wrap: wrap; }
      .post-excerpt { font-size: 13px; }
      .post-content { font-size: 14px; }
      .post-content .img-container img { max-height: 240px; }
      .img-lightbox { padding: 12px; }
      .img-lightbox img { max-width: 98vw; max-height: 98vh; }
    }
    /* Print styles */
    @media print {
      nav, footer, .pagination, .img-lightbox, .nav-toggle { display: none !important; }
      .container { max-width: 100%; padding: 0; }
      body { font-size: 12pt; color: #000; background: #fff; }
      a { color: #000; text-decoration: underline; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>
  <div class="img-lightbox" id="imgLightbox"><img src="" alt="Full-size image"></div>
  <script>
    (function() {
      // --- Mobile nav toggle ---
      var toggle = document.getElementById('navToggle');
      var links = document.getElementById('navLinks');
      if (toggle && links) {
        toggle.addEventListener('click', function() {
          links.classList.toggle('open');
        });
      }

      // --- Wrap images for responsive handling ---
      var images = document.querySelectorAll('.post-content img');
      for (var i = 0; i < images.length; i++) {
        var img = images[i];
        // Skip images already wrapped
        if (img.parentElement && img.parentElement.classList.contains('img-container')) continue;
        // Skip data-uri or very small images (icons)
        if (img.src.indexOf('data:') === 0) continue;
        if (img.naturalWidth && img.naturalWidth < 100) continue;

        var container = document.createElement('div');
        container.className = 'img-container';
        img.parentNode.insertBefore(container, img);
        container.appendChild(img);

        // Lazy load
        img.classList.add('loading');
        if (img.complete) {
          img.classList.remove('loading');
          img.classList.add('loaded');
        } else {
          img.addEventListener('load', function() {
            this.classList.remove('loading');
            this.classList.add('loaded');
          });
          img.addEventListener('error', function() {
            this.classList.remove('loading');
            this.classList.add('loaded');
          });
          // Native lazy loading
          img.loading = 'lazy';
        }

        // --- Click-to-zoom lightbox ---
        (function(im) {
          container.addEventListener('click', function(e) {
            e.stopPropagation();
            var lb = document.getElementById('imgLightbox');
            if (!lb) return;
            var lbImg = lb.querySelector('img');
            if (!lbImg) return;
            lbImg.src = im.src;
            lbImg.alt = im.alt || '';
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
          });
        })(img);
      }

      // --- Close lightbox on click ---
      var lightbox = document.getElementById('imgLightbox');
      if (lightbox) {
        lightbox.addEventListener('click', function() {
          this.classList.remove('active');
          document.body.style.overflow = '';
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && lightbox.classList.contains('active')) {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
          }
        });
      }

      // --- Wrap tables for horizontal scroll ---
      var tables = document.querySelectorAll('.post-content table');
      for (var t = 0; t < tables.length; t++) {
        var table = tables[t];
        if (table.parentElement && table.parentElement.classList.contains('table-wrap')) continue;
        var wrapper = document.createElement('div');
        wrapper.className = 'table-wrap';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      }
    })();
  </script>
</body>
</html>
