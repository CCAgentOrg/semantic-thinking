<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
      --container: 680px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: var(--container);
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ---- Navigation ---- */
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
      flex-wrap: wrap;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--fg);
    }
    .nav-toggle svg { display: block; }
    .nav-links { display: flex; gap: 24px; align-items: center; }

    /* ---- Typography ---- */
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ---- Post List ---- */
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); transition: color 0.15s; }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }

    /* ---- Home ---- */
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }

    /* ---- Post Content ---- */
    .post-content { max-width: var(--container); }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
      -webkit-overflow-scrolling: touch;
    }
    .post-content pre code {
      display: block;
      padding: 0;
      border: none;
      background: none;
      font-size: 13px;
      line-height: 1.5;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }

    /* ---- Images ---- */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 20px 0;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    .post-content img:hover { opacity: 0.95; }
    .post-content .image-container {
      position: relative;
      margin: 20px 0;
    }
    .post-content .image-container img { margin: 0; }

    /* Image lightbox overlay */
    .img-lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      cursor: zoom-out;
      padding: 24px;
      align-items: center;
      justify-content: center;
    }
    .img-lightbox.active { display: flex; }
    .img-lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    /* ---- Tables ---- */
    .post-content .table-wrap {
      overflow-x: auto;
      margin: 16px 0;
      -webkit-overflow-scrolling: touch;
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 500px;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    .post-content th {
      background: var(--bg-card);
      font-weight: 600;
    }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* ---- Pagination ---- */
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a { font-size: 14px; font-weight: 500; }

    .about-content { margin-top: 32px; }

    /* ---- Footer ---- */
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }

    /* ---- Responsive: ≤768px ---- */
    @media (max-width: 768px) {
      .container { padding: 40px 20px 60px; }
      body { font-size: 15px; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; }
      .home-intro h1 { font-size: 1.6rem; }
      .post-content pre { font-size: 12px; padding: 12px; }
      .post-content pre code { font-size: 12px; }
      .post-content th, .post-content td { white-space: normal; }
      .post-content table { min-width: 0; }
    }

    /* ---- Responsive: ≤480px ---- */
    @media (max-width: 480px) {
      .container { padding: 24px 16px 48px; }
      body { font-size: 14px; line-height: 1.6; }
      h1 { font-size: 1.3rem; }
      h2 { font-size: 1.1rem; }
      .home-intro h1 { font-size: 1.4rem; }
      .home-intro p { font-size: 14px; }
      .post-title { font-size: 1.05rem; }

      /* Mobile nav toggle */
      .nav-toggle { display: block; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 4px;
        padding: 12px 0 8px;
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        display: block;
        padding: 8px 0;
        font-size: 15px;
        border-bottom: 1px solid var(--border);
      }
      .nav-links a:last-child { border-bottom: none; }

      .post-list li { padding: 16px 0; }
      .post-content { font-size: 15px; }
      .post-content pre { font-size: 11px; padding: 10px; }
      .post-content pre code { font-size: 11px; }
      .post-content th, .post-content td { font-size: 12px; padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line class="top" x1="4" y1="7" x2="20" y2="7"/>
          <line class="mid" x1="4" y1="12" x2="20" y2="12"/>
          <line class="bot" x1="4" y1="17" x2="20" y2="17"/>
        </svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>

  <!-- Image lightbox overlay -->
  <div class="img-lightbox" id="imgLightbox">
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    (function() {
      /* === Mobile nav toggle === */
      var toggle = document.getElementById('navToggle');
      var links = document.getElementById('navLinks');
      if (toggle && links) {
        toggle.addEventListener('click', function() {
          links.classList.toggle('open');
        });
      }

      /* === Image lightbox === */
      var lightbox = document.getElementById('imgLightbox');
      var lightboxImg = document.getElementById('lightboxImg');
      if (lightbox && lightboxImg) {
        document.querySelectorAll('.post-content img').forEach(function(img) {
          img.addEventListener('click', function(e) {
            e.stopPropagation();
            lightboxImg.src = this.src;
            lightboxImg.alt = this.alt || '';
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
          });
        });
        lightbox.addEventListener('click', function() {
          lightbox.classList.remove('active');
          document.body.style.overflow = '';
        });
        /* Escape key closes lightbox */
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && lightbox.classList.contains('active')) {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
          }
        });
      }

      /* === Responsive table wrappers === */
      document.querySelectorAll('.post-content table').forEach(function(table) {
        var wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
      });

      /* === Lazy-load images with native loading === */
      if ('loading' in HTMLImageElement.prototype) {
        document.querySelectorAll('.post-content img:not([loading])').forEach(function(img) {
          img.setAttribute('loading', 'lazy');
        });
      }
    })();
  </script>
</body>
</html>
