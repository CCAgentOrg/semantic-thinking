<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
      --nav-h: 48px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ── Navigation ── */
    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      align-items: center;
      position: relative;
    }
    nav a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--fg);
    }
    .nav-toggle svg {
      display: block;
      width: 24px;
      height: 24px;
    }

    /* ── Typography ── */
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ── Post list (home) ── */
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }

    /* ── Home intro ── */
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }

    /* ── Post content ── */
    .post-content { max-width: 680px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 {
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-top: 40px;
    }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
      word-break: break-word;
    }
    .post-content pre {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      margin: 16px 0;
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      border: none;
      background: none;
      font-size: 13px;
      line-height: 1.5;
      word-break: normal;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }

    /* ── Images ── */
    .post-content .img-container {
      margin: 20px 0;
      text-align: center;
    }
    .post-content .img-container img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      cursor: zoom-in;
      transition: filter 0.2s;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    .post-content .img-container img:hover {
      filter: brightness(0.95);
    }
    @media (prefers-color-scheme: dark) {
      .post-content .img-container img {
        border-color: #333;
      }
      .post-content .img-container img:hover {
        filter: brightness(1.1);
      }
    }
    .post-content .img-caption {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: var(--fg-muted);
      line-height: 1.4;
    }

    /* ── Image lightbox (click-to-expand) ── */
    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      cursor: zoom-out;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-overlay img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* ── Tables ── */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: max-content;
    }
    .post-content th, .post-content td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .post-content th { background: var(--bg-card); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }

    .about-content { margin-top: 32px; }

    /* ── Footer ── */
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .container {
        padding: 28px 16px 60px;
      }
      nav {
        flex-wrap: wrap;
        gap: 0;
        margin-bottom: 28px;
      }
      nav .site-title {
        font-size: 15px;
      }
      .nav-toggle {
        display: block;
        margin-left: auto;
      }
      nav .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 0;
        margin-top: 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      nav .nav-links.open { display: flex; }
      nav .nav-links a {
        display: block;
        padding: 12px 16px;
        font-size: 15px;
        border-bottom: 1px solid var(--border);
      }
      nav .nav-links a:last-child { border-bottom: none; }

      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; margin-top: 24px; }
      .home-intro h1 { font-size: 1.6rem; }
      .home-intro p { font-size: 14px; }
      .post-title { font-size: 1.1rem; }
      .post-content { font-size: 15px; }
      .post-content pre code { font-size: 12px; padding: 12px; }

      .post-content .img-container {
        margin: 16px -8px;
      }
      .post-content .img-container img {
        border-radius: 4px;
      }

      footer {
        margin-top: 40px;
      }

      .lightbox-overlay {
        padding: 12px;
      }
    }

    @media (max-width: 400px) {
      h1 { font-size: 1.3rem; }
      .container { padding: 20px 12px 48px; }
      .post-content { font-size: 14px; }
      .post-content pre code { font-size: 11px; }
    }

    /* ── Print ── */
    @media print {
      .nav-toggle, .lightbox-overlay { display: none !important; }
      .post-content .img-container img { cursor: default; border: 1px solid #ccc; }
      body { font-size: 12pt; }
      .container { max-width: 100%; padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}" style="color:var(--fg);text-decoration:none;">{{ site.title }}</a></span>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>

  <div class="lightbox-overlay" id="lightbox">
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    (function() {
      // ── Mobile nav toggle ──
      var toggle = document.getElementById('navToggle');
      var links = document.getElementById('navLinks');
      if (toggle && links) {
        toggle.addEventListener('click', function(e) {
          e.stopPropagation();
          links.classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
          if (links.classList.contains('open') && !links.contains(e.target) && e.target !== toggle) {
            links.classList.remove('open');
          }
        });
      }

      // ── Image lightbox (click-to-zoom) ──
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightboxImg');
      if (lightbox && lightboxImg) {
        lightbox.addEventListener('click', function(e) {
          if (e.target === lightbox || e.target === lightboxImg) {
            lightbox.classList.remove('active');
          }
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && lightbox.classList.contains('active')) {
            lightbox.classList.remove('active');
          }
        });
      }

      // ── Image enhancement ──
      var images = document.querySelectorAll('.post-content img');
      for (var i = 0; i < images.length; i++) {
        var img = images[i];

        // Wrap standalone images in .img-container with caption
        if (!img.parentElement.classList.contains('img-container')) {
          var wrapper = document.createElement('div');
          wrapper.className = 'img-container';

          var caption = document.createElement('span');
          caption.className = 'img-caption';
          caption.textContent = img.getAttribute('alt') || '';

          img.parentElement.insertBefore(wrapper, img);
          wrapper.appendChild(img);
          wrapper.appendChild(caption);
        }

        // Click-to-zoom
        (function(imgEl) {
          imgEl.addEventListener('click', function(e) {
            e.stopPropagation();
            if (lightbox && lightboxImg) {
              lightboxImg.src = imgEl.src;
              lightboxImg.alt = imgEl.alt || '';
              lightbox.classList.add('active');
            }
          });
        })(img);

        // Lazy loading
        img.setAttribute('loading', 'lazy');
      }

      // ── Table wrapper ──
      var tables = document.querySelectorAll('.post-content table');
      for (var j = 0; j < tables.length; j++) {
        var table = tables[j];
        if (!table.parentElement.classList.contains('table-wrap')) {
          var wrap = document.createElement('div');
          wrap.className = 'table-wrap';
          table.parentElement.insertBefore(wrap, table);
          wrap.appendChild(table);
        }
      }
    })();
  </script>
</body>
</html>
