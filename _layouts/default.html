<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --border: #e0ddd5;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-card: #fff;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --fg: #e8e6e1;
        --fg-muted: #888;
        --border: #2a2a28;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --bg-card: #1a1a18;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ---- Navigation ---- */
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 24px;
      margin-bottom: 48px;
      align-items: center;
    }
    nav .site-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--fg);
      margin-right: auto;
      line-height: 1.3;
    }
    nav .site-title a {
      color: var(--fg);
      text-decoration: none;
    }
    nav .site-title a:hover { color: var(--accent); }
    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .nav-links a {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .nav-links a:hover { color: var(--accent); }

    /* Hamburger toggle (hidden on desktop) */
    .nav-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      color: var(--fg);
      font-size: 18px;
      line-height: 1;
    }
    .nav-toggle:hover { background: var(--bg-card); }

    @media (max-width: 600px) {
      .container {
        padding: 24px 16px 60px;
      }
      nav { margin-bottom: 32px; }
      .nav-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 4px;
        padding: 12px 0 4px;
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        display: block;
        padding: 8px 0;
        font-size: 15px;
        border-bottom: 1px solid var(--border);
        width: 100%;
      }
      .nav-links a:last-child { border-bottom: none; }
    }

    /* ---- Typography ---- */
    h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    h2 { font-size: 1.35rem; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }
    h3 { font-size: 1.1rem; margin-top: 24px; margin-bottom: 8px; font-weight: 600; }
    p { margin-bottom: 16px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    @media (max-width: 480px) {
      body { font-size: 15px; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; margin-top: 24px; }
      h3 { font-size: 1rem; }
    }

    /* ---- Post List ---- */
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-meta {
      font-size: 13px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .post-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
    .post-title a { color: var(--fg); }
    .post-title a:hover { color: var(--accent); }
    .post-excerpt { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--border);
      color: var(--fg-muted);
    }
    .home-intro { margin-bottom: 48px; }
    .home-intro h1 { font-size: 2rem; margin-bottom: 12px; }
    .home-intro p { color: var(--fg-muted); font-size: 15px; line-height: 1.7; }

    @media (max-width: 480px) {
      .home-intro h1 { font-size: 1.6rem; }
      .post-title { font-size: 1.05rem; }
    }

    /* ---- Post Content ---- */
    .post-content { max-width: 720px; }
    .post-content h1 { margin-top: 40px; }
    .post-content h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .post-content pre {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      margin: 16px 0;
    }
    .post-content pre code {
      display: block;
      padding: 16px;
      font-size: 13px;
      line-height: 1.5;
      border: none;
      background: none;
      width: max-content;
      min-width: 100%;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      color: var(--fg-muted);
      font-style: italic;
    }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .post-content ul, .post-content ol {
      padding-left: 24px;
      margin-bottom: 16px;
    }
    .post-content li { margin-bottom: 4px; }

    /* ---- Images ---- */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 20px 0;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .post-content img:hover {
      opacity: 0.95;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    @media (prefers-color-scheme: dark) {
      .post-content img {
        border-color: var(--border);
        filter: brightness(0.95);
      }
      .post-content img:hover {
        filter: brightness(1);
      }
    }

    /* Image lightbox overlay */
    .img-lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .img-lightbox.open { display: flex; }
    .img-lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 4px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
      object-fit: contain;
    }

    /* ---- Tables ---- */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    th { background: var(--bg-card); font-weight: 600; }
    @media (max-width: 600px) {
      th, td { padding: 6px 8px; font-size: 13px; }
    }

    /* ---- Pagination ---- */
    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination a {
      font-size: 14px;
      font-weight: 500;
    }

    /* ---- About ---- */
    .about-content { margin-top: 32px; }

    /* ---- Footer ---- */
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--fg-muted);
    }

    /* ---- Back to top ---- */
    .back-to-top {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--fg-muted);
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .back-to-top.visible { display: flex; }
    .back-to-top:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ---- Print ---- */
    @media print {
      .back-to-top, .nav-toggle { display: none !important; }
      .post-content img { cursor: default; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <span class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></span>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </nav>
    {{ content }}
    <footer>
      <p>{{ site.title }} &mdash; by {{ site.author }}. Thoughts on AI, technology, and the assumptions we carry.</p>
    </footer>
  </div>

  <!-- Image lightbox -->
  <div class="img-lightbox" id="imgLightbox">
    <img src="" alt="" id="lightboxImg" />
  </div>

  <!-- Back to top -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

  <script>
    (function() {
      'use strict';

      // --- Mobile nav toggle ---
      var toggle = document.getElementById('navToggle');
      var links = document.getElementById('navLinks');
      if (toggle && links) {
        toggle.addEventListener('click', function() {
          links.classList.toggle('open');
        });
        // Close nav on link click (mobile)
        [].slice.call(links.querySelectorAll('a')).forEach(function(link) {
          link.addEventListener('click', function() {
            links.classList.remove('open');
          });
        });
      }

      // --- Image lightbox ---
      var lightbox = document.getElementById('imgLightbox');
      var lightboxImg = document.getElementById('lightboxImg');
      if (lightbox && lightboxImg) {
        [].slice.call(document.querySelectorAll('.post-content img')).forEach(function(img) {
          img.addEventListener('click', function(e) {
            e.stopPropagation();
            lightboxImg.src = img.src;
            lightboxImg.alt = img.alt;
            lightbox.classList.add('open');
          });
        });
        lightbox.addEventListener('click', function() {
          lightbox.classList.remove('open');
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') lightbox.classList.remove('open');
        });
      }

      // --- Lazy load images ---
      if ('IntersectionObserver' in window) {
        [].slice.call(document.querySelectorAll('.post-content img[loading="lazy"]')).forEach(function(img) {
          // Already handled by native lazy; this is a fallback wrapper
        });
      }

      // --- Back to top ---
      var backBtn = document.getElementById('backToTop');
      if (backBtn) {
        window.addEventListener('scroll', function() {
          backBtn.classList.toggle('visible', window.scrollY > 400);
        });
        backBtn.addEventListener('click', function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      // --- Wrap tables for horizontal scroll ---
      [].slice.call(document.querySelectorAll('.post-content table')).forEach(function(table) {
        if (table.parentNode.classList && table.parentNode.classList.contains('table-wrapper')) return;
        var wrapper = document.createElement('div');
        wrapper.className = 'table-wrapper';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      });

    })();
  </script>
</body>
</html>
